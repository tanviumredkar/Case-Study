<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class - Classroom</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

<header class="header">
  <div class="header-left">
    <button class="back-btn" onclick="goBack()">
      <span class="material-icons">arrow_back</span>
    </button>
    <div class="class-info">
      <h1 id="classTitle"></h1>
      <p>Teacher: <span id="user"></span></p>
    </div>
  </div>
  <div class="header-right">
    <button class="invite-btn">
      <span class="material-icons">person_add</span>
      Invite students
    </button>
  </div>
</header>

<nav class="tabs">
  <button onclick="showTab('stream')" class="tab-btn active">
    <span class="material-icons">forum</span>
    Stream
  </button>
  <button onclick="showTab('classwork')" class="tab-btn">
    <span class="material-icons">assignment</span>
    Classwork
  </button>
  <button onclick="showTab('people')" class="tab-btn">
    <span class="material-icons">people</span>
    People
  </button>
</nav>

<main class="main-content">
  <!-- STREAM -->
  <div id="stream" class="tab-content active">
    <div class="announcement-box">
      <div class="announcement-input">
        <div class="user-avatar">
          <span class="material-icons">account_circle</span>
        </div>
        <input type="text" id="postInput" placeholder="Announce something to your class">
      </div>
      <button onclick="addPost()" class="post-btn">Post</button>
    </div>
    <div id="postList" class="posts-list"></div>
  </div>

  <!-- CLASSWORK -->
  <div id="classwork" class="tab-content">
    <div class="assignment-box">
      <div class="assignment-input">
        <div class="user-avatar">
          <span class="material-icons">account_circle</span>
        </div>
        <input type="text" id="assignmentInput" placeholder="Create assignment">
      </div>
      <button onclick="addAssignment()" class="assign-btn">Assign</button>
    </div>
    <div id="assignmentList" class="assignments-list"></div>
  </div>

  <!-- PEOPLE -->
  <div id="people" class="tab-content">
    <h3>Teachers</h3>
    <div class="people-list">
      <div class="person">
        <div class="user-avatar">
          <span class="material-icons">account_circle</span>
        </div>
        <span id="teacherName"></span>
      </div>
    </div>
    <h3>Students</h3>
    <div class="people-list">
      <p>No students yet</p>
    </div>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
